apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hev-shop.fullname" . }}-indexer-api
  labels:
    {{- include "hev-shop.labels" . | nindent 4 }}
    app.kubernetes.io/component: indexer-api
spec:
  replicas: {{ .Values.indexerApi.replicaCount }}
  strategy:
    {{- toYaml .Values.indexerApi.strategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "hev-shop.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: indexer-api
  template:
    metadata:
      labels:
        {{- include "hev-shop.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: indexer-api
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.indexerApi.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.indexerApi.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: indexer-api
          image: {{ include "hev-shop.indexerImage" . | quote }}
          imagePullPolicy: {{ .Values.indexerImage.pullPolicy }}
          # The control plane (/index, /status) just enqueues jobs into Layer
          # pipelines — no model loads, no warm task. Worker pods are owned by
          # the Layer operator via the Pipeline resources in indexer/pipelines/
          # and run the extract-chunk/embed targets of the same Dockerfile.
          command: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "8080"]
          ports:
            - name: http
              containerPort: 8080
          env:
            # Sourced from the Layer-managed secret so a deploy can't blank it
            # (overrides the same key from the envFrom secretRef below).
            {{- include "hev-shop.gatewayApiKeyEnv" . | nindent 12 }}
            {{- with .Values.indexerApi.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "hev-shop.configName" . }}
            - secretRef:
                name: {{ include "hev-shop.secretName" . }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.indexerApi.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "hev-shop.fullname" . }}-indexer-api
  labels:
    {{- include "hev-shop.labels" . | nindent 4 }}
    app.kubernetes.io/component: indexer-api
spec:
  type: ClusterIP
  selector:
    {{- include "hev-shop.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: indexer-api
  ports:
    - name: http
      port: 8080
      targetPort: http
