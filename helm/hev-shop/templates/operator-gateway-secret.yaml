{{- with .Values.operatorGatewaySecret }}
{{- if .create }}
# Mirror of LAYER_GATEWAY_API_KEY into the secret shape the layer-operator
# expects when injecting credentials into operator-emitted UDF worker pods.
# The operator reads from secret name `{{ .name }}` and key `{{ .key }}`
# (see apps/layer-operator/src/reconciler.rs:apply_udf_deployment).
apiVersion: v1
kind: Secret
metadata:
  name: {{ .name }}
  labels:
    {{- include "hev-shop.labels" $ | nindent 4 }}
    app.kubernetes.io/component: operator-gateway-secret
type: Opaque
stringData:
  {{ .key }}: {{ $.Values.secrets.layerApiKey | trim | quote }}
{{- end }}
{{- end }}
