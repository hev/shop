{{- if .Values.autoscaling.enabled }}
{{- $root := . -}}
---
# Layer's /v2/metrics endpoint (where these triggers scrape) requires a bearer
# token since layer#10. Reuse the same key the indexer/web pods read from the
# Secret. authModes=bearer on each prometheus trigger pulls this in.
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: {{ include "hev-shop.fullname" $root }}-gateway-auth
  labels:
    {{- include "hev-shop.labels" $root | nindent 4 }}
spec:
  secretTargetRef:
    - parameter: bearerToken
      name: {{ include "hev-shop.secretName" $root }}
      key: LAYER_GATEWAY_API_KEY
{{- range $key, $worker := .Values.workers }}
{{- if and $worker.enabled $worker.autoscaling.enabled }}
---
apiVersion: {{ $root.Values.autoscaling.apiVersion }}
kind: ScaledObject
metadata:
  name: {{ include "hev-shop.fullname" $root }}-{{ $worker.nameSuffix }}
  labels:
    {{- include "hev-shop.labels" $root | nindent 4 }}
    app.kubernetes.io/component: {{ $worker.component }}
spec:
  scaleTargetRef:
    name: {{ include "hev-shop.fullname" $root }}-{{ $worker.nameSuffix }}
  pollingInterval: {{ $worker.autoscaling.pollingInterval }}
  cooldownPeriod: {{ $worker.autoscaling.cooldownPeriod }}
  minReplicaCount: {{ $worker.autoscaling.minReplicaCount }}
  maxReplicaCount: {{ $worker.autoscaling.maxReplicaCount }}
  triggers:
    - type: prometheus
      metadata:
        serverAddress: {{ $root.Values.autoscaling.prometheusServerAddress | quote }}
        metricName: {{ $worker.autoscaling.metricName | quote }}
        query: {{ tpl $worker.autoscaling.query $root | quote }}
        threshold: {{ $worker.autoscaling.threshold | quote }}
        activationThreshold: {{ $worker.autoscaling.activationThreshold | quote }}
        authModes: "bearer"
      authenticationRef:
        name: {{ include "hev-shop.fullname" $root }}-gateway-auth
{{- end }}
{{- end }}
{{- end }}
