apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hev-shop.fullname" . }}-search
  labels:
    {{- include "hev-shop.labels" . | nindent 4 }}
    app.kubernetes.io/component: search
spec:
  replicas: {{ .Values.search.replicaCount }}
  strategy:
    {{- toYaml .Values.search.strategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "hev-shop.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: search
  template:
    metadata:
      labels:
        {{- include "hev-shop.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: search
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.search.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.search.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: search
          image: {{ include "hev-shop.searchImage" . | quote }}
          imagePullPolicy: {{ .Values.searchImage.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          env:
            # Sourced from the Layer-managed secret so a deploy can't blank it
            # (overrides the same key from the envFrom secretRef below).
            {{- include "hev-shop.gatewayApiKeyEnv" . | nindent 12 }}
            {{- with .Values.search.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "hev-shop.configName" . }}
            - secretRef:
                name: {{ include "hev-shop.secretName" . }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          # 60s startup window covers loading CLIP weights off the baked
          # image; livenessProbe timeoutSeconds defaults to 1s which
          # previously killed the pod when the event loop briefly stalled
          # during a model load.
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 24
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.search.resources | nindent 12 }}
          {{- if or .Values.persistence.enabled .Values.search.volumeMounts }}
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
            {{- with .Values.search.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
      {{- if or .Values.persistence.enabled .Values.search.volumes }}
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "hev-shop.pvcName" . }}
        {{- end }}
        {{- with .Values.search.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "hev-shop.fullname" . }}-search
  labels:
    {{- include "hev-shop.labels" . | nindent 4 }}
    app.kubernetes.io/component: search
spec:
  type: ClusterIP
  selector:
    {{- include "hev-shop.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: search
  ports:
    - name: http
      port: 8080
      targetPort: http
