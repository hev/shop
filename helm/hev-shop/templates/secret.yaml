{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "hev-shop.secretName" . }}
  labels:
    {{- include "hev-shop.labels" . | nindent 4 }}
type: Opaque
stringData:
  HF_TOKEN: {{ .Values.secrets.hfToken | trim | quote }}
{{- if not .Values.secrets.gatewayKeySecret }}
  # Only carried in the chart secret when NOT sourcing from an external,
  # Layer-managed secret (see secrets.gatewayKeySecret and the
  # hev-shop.gatewayApiKeyEnv helper). Otherwise the deployments reference that
  # secret directly so a deploy can't blank the key.
  LAYER_GATEWAY_API_KEY: {{ .Values.secrets.layerApiKey | trim | quote }}
{{- end }}
{{- end }}
