{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "hev-shop.secretName" . }}
  labels:
    {{- include "hev-shop.labels" . | nindent 4 }}
type: Opaque
stringData:
  LAYER_DATABASE_URL: {{ .Values.layer.databaseUrl | quote }}
  HF_TOKEN: {{ .Values.secrets.hfToken | quote }}
  OPENROUTER_API_KEY: {{ .Values.secrets.openrouterApiKey | quote }}
{{- end }}
