namespace:
  create: false

indexerImage:
  repository: ghcr.io/hev/hev-shop-indexer
  # `tag` is used by all worker deployments. `apiTag` (optional) overrides
  # the image for the API pod — keep this set to a slim variant built with
  # BAKE_QWEN=false so the image fits on the small infra node. Leave apiTag
  # empty in environments where the infra node has room for the full image.
  tag: latest
  apiTag: ""
  pullPolicy: Always

webImage:
  repository: ghcr.io/hev/hev-shop-web
  tag: latest
  pullPolicy: Always

imagePullSecrets: []

layer:
  gatewayUrl: http://layer-gateway.layer.svc.cluster.local:8080

secrets:
  create: true
  existingSecret: ""
  hfToken: ""
  openrouterApiKey: ""

persistence:
  enabled: true
  existingClaim: ""
  storageClassName: hev-shop-efs
  accessModes:
    - ReadWriteMany
  size: 100Gi
  mountPath: /data

pipeline:
  extraction:
    id: hev-shop-extraction-jobs
  product:
    id: amazon-products-images
    namespace: amazon-products
  reviews:
    id: hev-shop-reviews
    # Versioned prefix — bump (e.g. v3-amazon-reviews) when you re-embed
    # with a new model. Workers and pipeline registration use this value;
    # the API can be pinned to an older namespace via queryNamespaceBase
    # below during a hot-swap migration.
    namespaceBase: v2-amazon-reviews
    # Optional read-side override (api + web warm). When unset, reads
    # follow namespaceBase. Set to the previous prefix while a backfill
    # is in flight to keep serving the old corpus, then unset to cut over.
    queryNamespaceBase: ""
    shardCount: 16
  reviewAggregate:
    id: amazon-products-review-tags

config:
  DEFAULT_CATEGORY: Electronics
  DISTANCE_METRIC: cosine_distance
  HF_DATASET: McAuley-Lab/Amazon-Reviews-2023
  DATA_DIR: /data
  DATASET_DIR: /data/dataset
  IMAGE_DIR: /data/images
  MODEL_CACHE_DIR: /opt/model-cache
  CLIP_MODEL_NAME: openai/clip-vit-large-patch14
  CLIP_DEVICE: auto
  PREWARM_TEXT_EMBEDDER: "true"
  META_CACHE_TTL_SECONDS: "30"
  REVIEW_EMBEDDING_MODEL_NAME: Qwen/Qwen3-Embedding-8B
  REVIEW_EMBEDDING_DEVICE: auto
  REVIEW_CHUNK_TOKENS: "256"
  REVIEW_CHUNK_OVERLAP: "32"
  HTTP_TIMEOUT_SECONDS: "300"
  EXTRACTION_JOB_SIZE: "10000"
  IMAGE_DOWNLOAD_CONCURRENCY: "8"
  EXTRACTION_CONCURRENCY: "16"
  REVIEW_STAGE_CONCURRENCY: "16"
  EMBEDDING_BATCH_SIZE: "16"
  REVIEW_EMBEDDING_BATCH_SIZE: "4"
  EMBEDDING_CLAIM_SIZE: "2000"
  VECTOR_UPSERT_BATCH_SIZE: "10000"
  REVIEW_AGGREGATE_SCAN_PAGE_SIZE: "10000"
  CHUNK_FETCH_CONCURRENCY: "32"
  CLEANUP_EMBEDDED_IMAGES: "true"
  WORKER_POLL_SECONDS: "5"
  CLAIM_LEASE_SECONDS: "900"
  CLAIM_HEARTBEAT_SECONDS: "60"
  REVIEW_CLASSIFICATION_BATCH_SIZE: "8"
  REVIEW_RECENT_CAP_PER_PRODUCT: "200"
  REVIEW_HELPFUL_CAP_PER_PRODUCT: "200"
  REVIEW_TAG_MIN_COUNT: "3"
  REVIEW_TAG_MIN_FRACTION: "0.05"
  REVIEW_TAG_SAMPLE_COUNT: "3"
  OPENROUTER_BASE_URL: https://openrouter.ai/api/v1
  OPENROUTER_MODEL: google/gemini-2.0-flash-lite-001
  OPENROUTER_APP_TITLE: hev-shop

autoscaling:
  enabled: true
  apiVersion: keda.sh/v1alpha1
  prometheusServerAddress: http://layer-gateway.layer.svc.cluster.local:8080/v2/metrics

karpenter:
  enabled: false
  clusterName: ""
  kubernetesVersion: ""
  nodeInstanceProfile: ""
  tags:
    Project: hev-shop
    ManagedBy: karpenter

  cpu:
    enabled: true
    name: ""
    amiFamily: AL2023
    rootVolumeSize: 100Gi
    rootVolumeThroughput: 500
    rootVolumeIops: 6000
    metadataOptions:
      httpEndpoint: enabled
      httpProtocolIPv6: disabled
      httpPutResponseHopLimit: 1
      httpTokens: required
    labels:
      mesh-role: app
      workload: hev-shop
    taints:
      - key: mesh-role
        value: app
        effect: NoSchedule
    requirements:
      - key: kubernetes.io/arch
        operator: In
        values: ["amd64"]
      - key: kubernetes.io/os
        operator: In
        values: ["linux"]
      - key: karpenter.sh/capacity-type
        operator: In
        values: ["on-demand"]
      - key: karpenter.k8s.aws/instance-category
        operator: In
        values: ["c", "m"]
      - key: karpenter.k8s.aws/instance-generation
        operator: Gt
        values: ["5"]
    limits:
      cpu: "32"
      memory: 128Gi
    disruption:
      budgets:
        - nodes: 10%
      consolidationPolicy: WhenEmpty
      consolidateAfter: 10m

  gpu:
    enabled: true
    name: ""
    amiFamily: AL2023
    instanceStorePolicy: RAID0
    metadataOptions:
      httpEndpoint: enabled
      httpProtocolIPv6: disabled
      httpPutResponseHopLimit: 1
      httpTokens: required
    labels:
      mesh-role: gpu
      workload: hev-shop
    taints:
      - key: nvidia.com/gpu
        value: "true"
        effect: NoSchedule
    requirements:
      - key: kubernetes.io/arch
        operator: In
        values: ["amd64"]
      - key: kubernetes.io/os
        operator: In
        values: ["linux"]
      - key: karpenter.sh/capacity-type
        operator: In
        values: ["spot", "on-demand"]
      - key: node.kubernetes.io/instance-type
        operator: In
        values:
          - g4dn.xlarge
          - g4dn.2xlarge
          - g4dn.4xlarge
          - g5.xlarge
          - g5.2xlarge
          - g5.4xlarge
    limits:
      cpu: "32"
      memory: 128Gi
    disruption:
      budgets:
        - nodes: 10%
      consolidationPolicy: WhenEmpty
      consolidateAfter: 10m

api:
  replicaCount: 1
  # Lands on the Karpenter `app` pool — the small `infra` m6a.large root
  # disk can't hold the indexer image (torch unpacks to ~14 GB and the
  # infra node has ~18 Gi total root, shared with the web pod).
  nodeSelector:
    mesh-role: app
  tolerations:
    - key: mesh-role
      operator: Equal
      value: app
      effect: NoSchedule
  # CLIP ViT-L/14 (~1.7 GB) is the only model the api pod loads — Qwen-8B
  # would need ~32 GB CPU and is gated off via API_REVIEW_SEARCH_ENABLED.
  # 3 Gi request gives CLIP + fastapi headroom on the m6a.large infra node.
  resources:
    requests:
      cpu: "1"
      memory: 3Gi
      ephemeral-storage: 10Gi
    limits:
      cpu: "4"
      memory: 5Gi
      ephemeral-storage: 15Gi
  env:
    # Models are baked into the image at /opt/model-cache (see indexer/Dockerfile).
    - name: API_MODEL_CACHE_DIR
      value: /opt/model-cache
    - name: HF_HOME
      value: /opt/model-cache
    - name: TRANSFORMERS_CACHE
      value: /opt/model-cache
    - name: API_REVIEW_SEARCH_ENABLED
      value: "false"

web:
  replicaCount: 1
  apiBaseUrl: ""
  service:
    type: LoadBalancer
    port: 80
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-type: nlb
  nodeSelector:
    mesh-role: infra
  tolerations:
    - key: mesh-role
      operator: Equal
      value: infra
      effect: NoSchedule
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

workers:
  cpu:
    enabled: true
    nameSuffix: cpu-worker
    component: cpu-worker
    workerType: cpu
    replicaCount: 0
    command: ["python", "-m", "app.worker"]
    nodeSelector:
      mesh-role: app
    tolerations:
      - key: mesh-role
        operator: Equal
        value: app
        effect: NoSchedule
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
        # Reserve enough ephemeral-storage so kubelet schedules at most
        # one cpu-worker per 50 GiB Karpenter node. The indexer image
        # unpacks to ~25 GiB and we leave headroom for OS + logs.
        ephemeral-storage: 35Gi
      limits:
        cpu: "2"
        memory: 2Gi
        ephemeral-storage: 40Gi
    autoscaling:
      enabled: true
      pollingInterval: 10
      cooldownPeriod: 60
      minReplicaCount: 0
      maxReplicaCount: 8
      metricName: hev_shop_extraction_jobs
      query: 'sum(layer_pipeline_stage_count{pipeline_id="{{ .Values.pipeline.extraction.id }}",stage=~"pending|extracting"}) or vector(0)'
      threshold: "2"
      activationThreshold: "0"

  gpu:
    enabled: true
    nameSuffix: gpu-worker
    component: gpu-worker
    workerType: gpu
    replicaCount: 0
    command: ["python", "-m", "app.worker"]
    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxSurge: 0
        maxUnavailable: 1
    nodeSelector:
      mesh-role: gpu
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: karpenter.k8s.aws/instance-family
                  operator: In
                  values: ["g4dn", "g5"]
                - key: karpenter.sh/capacity-type
                  operator: In
                  values: ["spot"]
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
    resources:
      requests:
        cpu: 250m
        memory: 4Gi
        nvidia.com/gpu: "1"
      limits:
        cpu: "2"
        memory: 10Gi
        nvidia.com/gpu: "1"
    autoscaling:
      enabled: true
      pollingInterval: 15
      cooldownPeriod: 300
      minReplicaCount: 0
      maxReplicaCount: 1
      metricName: hev_shop_product_embedding_docs
      query: 'sum(layer_pipeline_stage_count{pipeline_id="{{ .Values.pipeline.product.id }}",stage=~"pending|embedding"}) or vector(0)'
      threshold: "10000"
      activationThreshold: "0"

  reviewEmbed:
    enabled: true
    nameSuffix: review-embed-worker
    component: review-embed-worker
    workerType: review-embed
    replicaCount: 0
    command: ["python", "-m", "app.worker"]
    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxSurge: 0
        maxUnavailable: 1
    nodeSelector:
      mesh-role: gpu
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: karpenter.k8s.aws/instance-family
                  operator: In
                  values: ["g5"]
                - key: karpenter.sh/capacity-type
                  operator: In
                  values: ["on-demand"]
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
    resources:
      requests:
        cpu: "1"
        memory: 13Gi
        ephemeral-storage: 10Gi
        nvidia.com/gpu: "1"
      limits:
        cpu: "4"
        memory: 15Gi
        ephemeral-storage: 200Gi
        nvidia.com/gpu: "1"
    # Models are baked into the indexer image at /opt/model-cache — see
    # indexer/Dockerfile. The emptyDir is kept as a writable spillover in
    # case transformers tries to write tokenizer artifacts at runtime.
    env:
      - name: MODEL_CACHE_DIR
        value: /opt/model-cache
      - name: HF_HOME
        value: /opt/model-cache
      - name: TRANSFORMERS_CACHE
        value: /opt/model-cache
    volumeMounts:
      - name: model-cache-spill
        mountPath: /model-cache-spill
    volumes:
      - name: model-cache-spill
        emptyDir:
          sizeLimit: 50Gi
    autoscaling:
      enabled: true
      pollingInterval: 15
      cooldownPeriod: 300
      minReplicaCount: 0
      maxReplicaCount: 1
      metricName: hev_shop_review_embedding_docs
      query: 'sum(layer_pipeline_stage_count{pipeline_id="{{ .Values.pipeline.reviews.id }}",stage=~"pending|embedding"}) or vector(0)'
      threshold: "1000"
      activationThreshold: "0"

  reviewClassify:
    enabled: true
    nameSuffix: review-classify-worker
    component: review-classify-worker
    workerType: review-classify
    replicaCount: 0
    command: ["python", "-m", "app.worker"]
    nodeSelector:
      mesh-role: app
    tolerations:
      - key: mesh-role
        operator: Equal
        value: app
        effect: NoSchedule
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
    autoscaling:
      enabled: true
      pollingInterval: 30
      cooldownPeriod: 120
      minReplicaCount: 0
      maxReplicaCount: 4
      metricName: hev_shop_review_classification_docs
      query: 'sum(layer_pipeline_stage_count{pipeline_id="{{ .Values.pipeline.reviews.id }}",stage=~"pending|classifying"}) or vector(0)'
      threshold: "100"
      activationThreshold: "0"

  reviewAggregate:
    enabled: true
    nameSuffix: review-aggregate-worker
    component: review-aggregate-worker
    workerType: review-aggregate
    replicaCount: 0
    command: ["python", "-m", "app.worker"]
    nodeSelector:
      mesh-role: app
    tolerations:
      - key: mesh-role
        operator: Equal
        value: app
        effect: NoSchedule
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
    autoscaling:
      enabled: true
      pollingInterval: 15
      cooldownPeriod: 60
      minReplicaCount: 0
      maxReplicaCount: 4
      metricName: hev_shop_review_aggregation_docs
      query: 'sum(layer_pipeline_stage_count{pipeline_id="{{ .Values.pipeline.reviewAggregate.id }}",stage=~"pending|aggregating"}) or vector(0)'
      threshold: "1"
      activationThreshold: "0"
