namespace:
  create: false

indexerImage:
  # Worker + indexer control plane image. Bakes CLIP-image by default.
  # Built from indexer/Dockerfile.
  repository: ghcr.io/hev/hev-shop-indexer
  tag: latest
  # Optional slim image tag for the always-on indexer API. When unset, the API
  # uses `tag`. Workers always use `tag`.
  apiTag: ""
  pullPolicy: Always

searchImage:
  # Search read-API image. CLIP-text only. Built from search/Dockerfile.
  repository: ghcr.io/hev/hev-shop-search
  tag: latest
  pullPolicy: Always

webImage:
  repository: ghcr.io/hev/hev-shop-web
  tag: latest
  pullPolicy: Always

imagePullSecrets: []

layer:
  gatewayUrl: http://layer-gateway.layer.svc.cluster.local:8080

secrets:
  create: true
  existingSecret: ""
  hfToken: ""
  # Required since layer#10 — bearer token the gateway accepts on /v1 + /v2.
  # In our deploys this is the same value as the gateway's TURBOPUFFER_API_KEY
  # (see layer's scripts/deploy-layer.sh). Leave blank for local dev against a
  # gateway started without LAYER_GATEWAY_API_KEY (middleware is a no-op then).
  layerApiKey: ""

persistence:
  enabled: true
  existingClaim: ""
  storageClassName: hev-shop-efs
  accessModes:
    - ReadWriteMany
  size: 100Gi
  mountPath: /data

pipeline:
  # Pipeline IDs are app-owned Layer queues, so keep them under the hev-shop
  # prefix. The amazon-* names below are Turbopuffer namespaces for the source
  # corpus, not pipeline IDs.
  extraction:
    id: hev-shop-extraction-jobs
  product:
    id: hev-shop-product-images
    namespace: amazon-products

config:
  DEFAULT_CATEGORY: Electronics
  DISTANCE_METRIC: cosine_distance
  HF_DATASET: McAuley-Lab/Amazon-Reviews-2023
  DATA_DIR: /data
  DATASET_DIR: /data/dataset
  MODEL_CACHE_DIR: /opt/model-cache
  CLIP_MODEL_NAME: openai/clip-vit-large-patch14
  CLIP_DEVICE: auto
  PREWARM_TEXT_EMBEDDER: "true"
  META_CACHE_TTL_SECONDS: "30"
  HTTP_TIMEOUT_SECONDS: "300"
  EXTRACTION_JOB_SIZE: "10000"
  EXTRACTION_CONCURRENCY: "16"
  EMBEDDING_BATCH_SIZE: "16"
  EMBEDDING_CLAIM_SIZE: "2000"
  WORKER_POLL_SECONDS: "5"
  CLAIM_LEASE_SECONDS: "900"
  CLAIM_HEARTBEAT_SECONDS: "60"

autoscaling:
  enabled: true
  apiVersion: keda.sh/v1alpha1
  prometheusServerAddress: http://layer-gateway.layer.svc.cluster.local:8080/v2/metrics

karpenter:
  enabled: false
  clusterName: ""
  kubernetesVersion: ""
  nodeInstanceProfile: ""
  tags:
    Project: hev-shop
    ManagedBy: karpenter

  cpu:
    enabled: true
    name: ""
    amiFamily: AL2023
    rootVolumeSize: 100Gi
    rootVolumeThroughput: 500
    rootVolumeIops: 6000
    metadataOptions:
      httpEndpoint: enabled
      httpProtocolIPv6: disabled
      httpPutResponseHopLimit: 1
      httpTokens: required
    labels:
      mesh-role: app
      workload: hev-shop
    taints:
      - key: mesh-role
        value: app
        effect: NoSchedule
    requirements:
      - key: kubernetes.io/arch
        operator: In
        values: ["amd64"]
      - key: kubernetes.io/os
        operator: In
        values: ["linux"]
      - key: karpenter.sh/capacity-type
        operator: In
        values: ["on-demand"]
      - key: karpenter.k8s.aws/instance-category
        operator: In
        values: ["c", "m"]
      - key: karpenter.k8s.aws/instance-generation
        operator: Gt
        values: ["5"]
    limits:
      cpu: "32"
      memory: 128Gi
    disruption:
      budgets:
        - nodes: 10%
      consolidationPolicy: WhenEmpty
      consolidateAfter: 10m

  gpu:
    enabled: true
    name: ""
    amiFamily: AL2023
    instanceStorePolicy: RAID0
    metadataOptions:
      httpEndpoint: enabled
      httpProtocolIPv6: disabled
      httpPutResponseHopLimit: 1
      httpTokens: required
    labels:
      mesh-role: gpu
      workload: hev-shop
    taints:
      - key: nvidia.com/gpu
        value: "true"
        effect: NoSchedule
    requirements:
      - key: kubernetes.io/arch
        operator: In
        values: ["amd64"]
      - key: kubernetes.io/os
        operator: In
        values: ["linux"]
      - key: karpenter.sh/capacity-type
        operator: In
        values: ["spot", "on-demand"]
      - key: node.kubernetes.io/instance-type
        operator: In
        values:
          - g4dn.xlarge
          - g4dn.2xlarge
          - g4dn.4xlarge
          - g5.xlarge
          - g5.2xlarge
          - g5.4xlarge
    limits:
      cpu: "32"
      memory: 128Gi
    disruption:
      budgets:
        - nodes: 10%
      consolidationPolicy: WhenEmpty
      consolidateAfter: 10m

search:
  # Read API (/search, /recommend, /product, /meta).
  # Loads CLIP-text on boot to embed query strings.
  replicaCount: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  # Search carries the baked CLIP image, so keep it on the Karpenter app
  # nodepool with larger root volumes instead of the small shared infra node.
  nodeSelector:
    mesh-role: app
  tolerations:
    - key: mesh-role
      operator: Equal
      value: app
      effect: NoSchedule
  # Request the full expected CLIP working set so Karpenter provisions a node
  # large enough for CLIP startup and reserves image-disk headroom.
  resources:
    requests:
      cpu: 250m
      memory: 5Gi
      ephemeral-storage: 15Gi
    limits:
      cpu: "4"
      memory: 5Gi
      ephemeral-storage: 15Gi
  env:
    # Models are baked into the image at /opt/model-cache (see search/Dockerfile).
    - name: API_MODEL_CACHE_DIR
      value: /opt/model-cache
    - name: HF_HOME
      value: /opt/model-cache
    - name: TRANSFORMERS_CACHE
      value: /opt/model-cache

indexerApi:
  # Indexer control plane (/index, /status). No models load —
  # it just enqueues jobs into Layer pipelines, so it's cheap to keep up.
  # Workers pulling those jobs live in `workers` below.
  replicaCount: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  nodeSelector:
    mesh-role: app
  tolerations:
    - key: mesh-role
      operator: Equal
      value: app
      effect: NoSchedule
  resources:
    requests:
      cpu: 25m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi
  env: []

web:
  replicaCount: 1
  apiBaseUrl: ""
  service:
    type: LoadBalancer
    port: 80
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-type: nlb
  nodeSelector:
    mesh-role: infra
  tolerations:
    - key: mesh-role
      operator: Equal
      value: infra
      effect: NoSchedule
  resources:
    requests:
      cpu: 25m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 1Gi

workers:
  cpu:
    enabled: true
    nameSuffix: cpu-worker
    component: cpu-worker
    workerType: cpu
    replicaCount: 0
    command: ["python", "-m", "app.worker"]
    nodeSelector:
      mesh-role: app
    tolerations:
      - key: mesh-role
        operator: Equal
        value: app
        effect: NoSchedule
    resources:
      requests:
        cpu: "1"
        memory: 2Gi
        # Reserve enough ephemeral-storage so kubelet schedules at most
        # one cpu-worker per 100 GiB Karpenter node. Leave headroom for
        # image unpacking, dataset reads, OS, and logs.
        ephemeral-storage: 35Gi
      limits:
        cpu: "4"
        memory: 4Gi
        ephemeral-storage: 40Gi
    autoscaling:
      enabled: true
      pollingInterval: 10
      cooldownPeriod: 60
      minReplicaCount: 0
      maxReplicaCount: 8
      metricName: hev_shop_extraction_jobs
      query: 'sum(layer_pipeline_stage_count{pipeline_id="{{ .Values.pipeline.extraction.id }}",stage=~"pending|extracting"}) or vector(0)'
      threshold: "2"
      activationThreshold: "0"

  gpu:
    enabled: true
    nameSuffix: gpu-worker
    component: gpu-worker
    workerType: gpu
    replicaCount: 0
    command: ["python", "-m", "app.worker"]
    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxSurge: 0
        maxUnavailable: 1
    nodeSelector:
      mesh-role: gpu
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: karpenter.k8s.aws/instance-family
                  operator: In
                  values: ["g4dn", "g5"]
                - key: karpenter.sh/capacity-type
                  operator: In
                  values: ["spot"]
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
    resources:
      requests:
        cpu: 250m
        memory: 4Gi
        nvidia.com/gpu: "1"
      limits:
        cpu: "2"
        memory: 10Gi
        nvidia.com/gpu: "1"
    autoscaling:
      enabled: true
      pollingInterval: 15
      cooldownPeriod: 300
      minReplicaCount: 0
      maxReplicaCount: 1
      metricName: hev_shop_product_embedding_docs
      query: 'sum(layer_pipeline_stage_count{pipeline_id="{{ .Values.pipeline.product.id }}",stage=~"pending|embedding"}) or vector(0)'
      threshold: "10000"
      activationThreshold: "0"
