namespace:
  create: false

indexerImage:
  # Indexer control plane image — `api` target of indexer/Dockerfile.
  # Worker images (extract-chunk/embed targets) are deployed by the Layer
  # operator via the Pipeline resources in indexer/pipelines/.
  repository: ghcr.io/hev/hev-shop-indexer
  tag: latest
  pullPolicy: Always

searchImage:
  # Search read-API image. CLIP-text only. Built from search/Dockerfile.
  repository: ghcr.io/hev/hev-shop-search
  tag: latest
  pullPolicy: Always

webImage:
  repository: ghcr.io/hev/hev-shop-web
  tag: latest
  pullPolicy: Always

imagePullSecrets: []

layer:
  gatewayUrl: http://layer-gateway.layer.svc.cluster.local:8080

secrets:
  create: true
  existingSecret: ""
  hfToken: ""
  # Required since layer#10 — bearer token the gateway accepts on /v1 + /v2.
  # In our deploys this is the same value as the gateway's TURBOPUFFER_API_KEY
  # (see layer's scripts/deploy-layer.sh). Leave blank for local dev against a
  # gateway started without LAYER_GATEWAY_API_KEY (middleware is a no-op then).
  layerApiKey: ""

persistence:
  enabled: true
  existingClaim: ""
  storageClassName: hev-shop-efs
  accessModes:
    - ReadWriteMany
  size: 100Gi
  mountPath: /data

pipeline:
  # Pipeline IDs are app-owned Layer queues, so keep them under the hev-shop
  # prefix. The amazon-* names below are Turbopuffer namespaces for the source
  # corpus, not pipeline IDs.
  extraction:
    id: hev-shop-extraction-jobs
  product:
    id: hev-shop-product-images
    namespace: amazon-products

# Env for the API pods (search + indexer control plane). Worker pods are
# operator-owned and configured by injected env + code defaults instead.
config:
  DEFAULT_CATEGORY: Electronics
  DISTANCE_METRIC: cosine_distance
  CLIP_MODEL_NAME: openai/clip-vit-large-patch14
  CLIP_DEVICE: auto
  PREWARM_TEXT_EMBEDDER: "true"
  META_CACHE_TTL_SECONDS: "30"
  HTTP_TIMEOUT_SECONDS: "300"
  EXTRACTION_JOB_SIZE: "10000"

karpenter:
  enabled: false
  clusterName: ""
  kubernetesVersion: ""
  nodeInstanceProfile: ""
  tags:
    Project: hev-shop
    ManagedBy: karpenter

  cpu:
    enabled: true
    name: ""
    amiFamily: AL2023
    rootVolumeSize: 100Gi
    rootVolumeThroughput: 500
    rootVolumeIops: 6000
    metadataOptions:
      httpEndpoint: enabled
      httpProtocolIPv6: disabled
      httpPutResponseHopLimit: 1
      httpTokens: required
    labels:
      layer.hev.dev/node-role: worker-cpu
      layer.hev.dev/compute: cpu
      workload: hev-shop
    taints:
      - key: layer.hev.dev/node-role
        value: worker-cpu
        effect: NoSchedule
    requirements:
      - key: kubernetes.io/arch
        operator: In
        values: ["amd64"]
      - key: kubernetes.io/os
        operator: In
        values: ["linux"]
      - key: karpenter.sh/capacity-type
        operator: In
        values: ["on-demand"]
      - key: karpenter.k8s.aws/instance-category
        operator: In
        values: ["c", "m"]
      - key: karpenter.k8s.aws/instance-generation
        operator: Gt
        values: ["5"]
    limits:
      cpu: "32"
      memory: 128Gi
    disruption:
      budgets:
        - nodes: 10%
      consolidationPolicy: WhenEmpty
      consolidateAfter: 10m

  gpu:
    enabled: true
    name: ""
    amiFamily: AL2023
    instanceStorePolicy: RAID0
    metadataOptions:
      httpEndpoint: enabled
      httpProtocolIPv6: disabled
      httpPutResponseHopLimit: 1
      httpTokens: required
    labels:
      layer.hev.dev/node-role: worker-gpu
      layer.hev.dev/compute: gpu
      workload: hev-shop
    taints:
      - key: layer.hev.dev/node-role
        value: worker-gpu
        effect: NoSchedule
      - key: nvidia.com/gpu
        value: "true"
        effect: NoSchedule
    requirements:
      - key: kubernetes.io/arch
        operator: In
        values: ["amd64"]
      - key: kubernetes.io/os
        operator: In
        values: ["linux"]
      - key: karpenter.sh/capacity-type
        operator: In
        values: ["spot", "on-demand"]
      - key: node.kubernetes.io/instance-type
        operator: In
        values:
          - g4dn.xlarge
          - g4dn.2xlarge
          - g4dn.4xlarge
          - g5.xlarge
          - g5.2xlarge
          - g5.4xlarge
    limits:
      cpu: "32"
      memory: 128Gi
    disruption:
      budgets:
        - nodes: 10%
      consolidationPolicy: WhenEmpty
      consolidateAfter: 10m

search:
  # Read API (/search, /recommend, /product, /meta).
  # Loads CLIP-text on boot to embed query strings.
  replicaCount: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  # Search is part of the baseline serving path. Keep it on the always-on
  # system/cache node; extraction and embedding workers own elastic capacity.
  nodeSelector:
    layer.hev.dev/node-role: system
  tolerations:
    - key: layer.hev.dev/node-role
      operator: Equal
      value: system
      effect: NoSchedule
  # Request the full expected CLIP working set so Karpenter provisions a node
  # large enough for CLIP startup and reserves image-disk headroom.
  resources:
    requests:
      cpu: 250m
      memory: 5Gi
      ephemeral-storage: 15Gi
    limits:
      cpu: "4"
      memory: 5Gi
      ephemeral-storage: 15Gi
  env:
    # Models are baked into the image at /opt/model-cache (see search/Dockerfile).
    - name: API_MODEL_CACHE_DIR
      value: /opt/model-cache
    - name: HF_HOME
      value: /opt/model-cache
    - name: TRANSFORMERS_CACHE
      value: /opt/model-cache

indexerApi:
  # Indexer control plane (/index, /status). No models load —
  # it just enqueues jobs into Layer pipelines, so it's cheap to keep up.
  # Workers pulling those jobs live in `workers` below.
  replicaCount: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  nodeSelector:
    layer.hev.dev/node-role: system
  tolerations:
    - key: layer.hev.dev/node-role
      operator: Equal
      value: system
      effect: NoSchedule
  resources:
    requests:
      cpu: 25m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi
  env: []

web:
  replicaCount: 1
  apiBaseUrl: ""
  service:
    type: LoadBalancer
    port: 80
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-type: nlb
  nodeSelector:
    layer.hev.dev/node-role: system
  tolerations:
    - key: layer.hev.dev/node-role
      operator: Equal
      value: system
      effect: NoSchedule
  resources:
    requests:
      cpu: 25m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 1Gi

# Workers are not deployed by this chart. The CPU extraction and GPU embed
# workers are Pipeline resources under indexer/pipelines/; the Layer operator
# owns their Deployments and KEDA scaling.
