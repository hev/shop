# GPU embedding stage. The operator owns the worker Deployment + KEDA
# scaling; the pod runs embed.py against the injected HEVLAYER_PIPELINE_ID
# product queue. Requires the `gpu` compute pool in InfraRules/default
# (defined in the layer chart) and the worker-gpu Karpenter NodePool.
apiVersion: hevlayer.com/v1alpha1
kind: Pipeline
metadata:
  name: hev-shop-embed
  namespace: hev-shop
spec:
  pipelineId: hev-shop-product-images
  target:
    namespace: amazon-products
  worker:
    image: 186219257916.dkr.ecr.us-east-1.amazonaws.com/hev-shop-indexer:latest-embed
    # The gpu pool carries the worker-gpu selector, the node-role and nvidia
    # tolerations, and GPU resources; this podSpec only adds the
    # spot/instance preference.
    podSpec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: karpenter.k8s.aws/instance-family
                    operator: In
                    values: ["g4dn", "g5"]
                  - key: karpenter.sh/capacity-type
                    operator: In
                    # Prefer spot, but allow on-demand: the layer worker-gpu
                    # NodePool currently only offers on-demand, so a spot-only
                    # requirement leaves embed pods unschedulable.
                    values: ["spot", "on-demand"]
  scaling:
    pool: gpu
    mode: autoscale
    replicas:
      min: 0
      max: 1
