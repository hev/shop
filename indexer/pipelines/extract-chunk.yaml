# CPU extraction stage. The operator owns the worker Deployment + KEDA
# scaling; the pod runs extract_chunk.py against the injected
# HEVLAYER_PIPELINE_ID job queue. Apply with:
#
#   kubectl apply -f indexer/pipelines/
#
# scripts/deploy.sh substitutes worker.image with the freshly pushed tag.
apiVersion: hevlayer.com/v1alpha1
kind: Pipeline
metadata:
  name: hev-shop-extract-chunk
  namespace: hev-shop
spec:
  pipelineId: hev-shop-extraction-jobs
  target:
    namespace: amazon-products
  sourceRef:
    kind: huggingface
    warehouseRef: huggingface-hub
    repo: McAuley-Lab/Amazon-Reviews-2023
    config: raw_meta_Electronics
    split: train
    revision: main
    cursor:
      field: parent_asin
  worker:
    # The cpu-large pool (layer chart) carries the worker-cpu selector and
    # toleration, so no podSpec placement override is needed.
    image: 186219257916.dkr.ecr.us-east-1.amazonaws.com/hev-shop-indexer:latest-extract
  scaling:
    # cpu-large reserves ephemeral-storage for the per-pod dataset cache.
    pool: cpu-large
    mode: autoscale
    replicas:
      min: 0
      max: 8
