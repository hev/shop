# UDF Custom Resource for the backfill-images workload.
#
# Apply:
#
#   kubectl apply -f indexer/udfs/backfill-images.yaml
#
# layer-operator reconciles this CR and emits:
#   - Deployment (image from spec.container.image; env injected for
#     HEVLAYER_UDF_ID, HEVLAYER_BASE_URL, LAYER_GATEWAY_API_KEY, etc.)
#   - AutoscalingPolicy → KEDA ScaledObject scaling from layer_udf_queue_depth
#   - No Service / readinessProbe because spec.container.dispatch=pull
#
# Lifecycle:
#   kubectl patch udf hev-shop-backfill-images --type=merge -p '{"spec":{"paused":true}}'
#   kubectl patch udf hev-shop-backfill-images --type=merge -p '{"spec":{"paused":false}}'
#   kubectl delete udf hev-shop-backfill-images           # finalizer drains the queue
#
# Until the gateway routes are CRD-backed (next phase of RFC 0008), the
# gateway-side queue + dispatch state is still seeded via POST /v2/udfs.
# After that lands, applying the CR is sufficient.
apiVersion: hevlayer.com/v1alpha1
kind: UDF
metadata:
  name: hev-shop-backfill-images
  namespace: hev-shop
  labels:
    app.kubernetes.io/name: hev-shop
    app.kubernetes.io/component: udf-backfill-images
spec:
  paused: false
  # Scans this namespace every schedule.discoveryIntervalSeconds for rows
  # matching `filter`. Shop has one product namespace today.
  targetNamespaces:
    - amazon-products
  # `id` is reserved — the dispatch loop substitutes the document id rather
  # than fetching a column.
  inputs:
    - id
    - image_url
  output:
    attribute: image
    kind: blob
    # Blob outputs default to Aerospike storage. Spelled out for clarity —
    # tpuf only stores the `_hevlayer_blob_image` content-type marker; the
    # bytes live in the doc cache.
    storage: aerospike
    # Bumping `version` re-enqueues every row whose image_v != "v1".
    version: v1
  # "Row hasn't been processed by the current version yet."
  # Matches rows with `image_v != "v1"` OR `image_v` is null (never processed).
  filter:
    - "Or"
    - - ["image_v", "NotEq", "v1"]
      - ["image_v", "Eq", null]
  triggers:
    - discovery
  container:
    image: 186219257916.dkr.ecr.us-east-1.amazonaws.com/amazon-reviews:shop-4240799-202605221138-udf-backfill-images
    # SDK runs a claim/poll loop (no HTTP server). With dispatch=pull the
    # operator skips Service + readinessProbe, which is what we want.
    dispatch: pull
    batchSize: 16
    timeoutSeconds: 30
  schedule:
    discoveryIntervalSeconds: 300
    leaseSeconds: 120
    maxInFlightBatches: 4
    maxConcurrentScans: 1
  retry:
    maxAttempts: 6
    initialBackoffSeconds: 5
    maxBackoffSeconds: 300
