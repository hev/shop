# Trending reduce (RFC 0040) — the first inhabitant of udfs/.
#
# Unlike the map UDFs the operator runs today (discover rows missing a marker →
# patch each row), this is a *reduce*: invoked once per tick, the worker
# (indexer/trending.py) reads the whole search-history window and writes one
# ranked summary into the `amazon-products-trending` namespace. The worker owns
# the reads and the upsert via the injected hev layer client — there is
# deliberately NO `spec.sources` / `spec.output` here, matching the CLAUDE.md
# authoring split (the operator owns worker shape + triggering; the document
# lifecycle stays in SDK calls next to the code that uses it).
#
# Layer supports `triggers: [schedule]` on Functions. Apply this resource
# when the trending worker image is deployed; for local/manual runs, use
# TRENDING_RUN_ONCE=1.
#
apiVersion: hevlayer.com/v1alpha1
kind: Function
metadata:
  name: hev-shop-trending
  namespace: hev-shop
spec:
  # A reduce has no per-row discovery, so no targetNamespaces / filter.
  triggers: [schedule]
  schedule:
    cron: "0 * * * *"             # hourly
  worker:
    image: 186219257916.dkr.ecr.us-east-1.amazonaws.com/hev-shop-indexer:latest-trending
  scaling:
    pool: cpu-large               # reduce is CPU-only; must name a pool in InfraRules/default
    mode: autoscale
    replicas:
      min: 0
      max: 1
