apiVersion: apps/v1
kind: Deployment
metadata:
  name: hev-shop-api
  labels:
    app.kubernetes.io/name: hev-shop
    app.kubernetes.io/component: api
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hev-shop
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hev-shop
        app.kubernetes.io/component: api
    spec:
      nodeSelector:
        mesh-role: infra
      tolerations:
        - key: mesh-role
          operator: Equal
          value: infra
          effect: NoSchedule
      containers:
        - name: api
          image: hev-shop-indexer:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: WORKER_TYPE
              value: api
          envFrom:
            - configMapRef:
                name: hev-shop-config
            - secretRef:
                name: hev-shop-secrets
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hev-shop-data
