apiVersion: v1
kind: ConfigMap
metadata:
  name: hev-shop-config
data:
  LAYER_GATEWAY_URL: http://layer-gateway.layer.svc.cluster.local:8080
  TURBOPUFFER_NAMESPACE: amazon-products
  EXTRACTION_PIPELINE_ID: hev-shop-extraction-jobs
  PIPELINE_ID: hev-shop-product-images
  REVIEWS_PIPELINE_ID: hev-shop-reviews
  REVIEWS_AGGREGATE_PIPELINE_ID: hev-shop-review-tags
  REVIEWS_NAMESPACE_BASE: amazon-reviews
  REVIEWS_NAMESPACE_SHARD_COUNT: "16"
  DEFAULT_CATEGORY: Electronics
  DISTANCE_METRIC: cosine_distance
  HF_DATASET: McAuley-Lab/Amazon-Reviews-2023
  DATA_DIR: /data
  DATASET_DIR: /data/dataset
  IMAGE_DIR: /data/images
  MODEL_CACHE_DIR: /data/models
  CLIP_MODEL_NAME: openai/clip-vit-large-patch14
  CLIP_DEVICE: auto
  REVIEW_EMBEDDING_MODEL_NAME: Qwen/Qwen3-Embedding-8B
  REVIEW_EMBEDDING_DEVICE: auto
  REVIEW_CHUNK_TOKENS: "256"
  REVIEW_CHUNK_OVERLAP: "32"
  HTTP_TIMEOUT_SECONDS: "300"
  EXTRACTION_JOB_SIZE: "10000"
  EXTRACTION_CONCURRENCY: "16"
  REVIEW_STAGE_CONCURRENCY: "16"
  EMBEDDING_BATCH_SIZE: "16"
  REVIEW_EMBEDDING_BATCH_SIZE: "4"
  EMBEDDING_CLAIM_SIZE: "2000"
  VECTOR_UPSERT_BATCH_SIZE: "10000"
  REVIEW_AGGREGATE_SCAN_PAGE_SIZE: "10000"
  CHUNK_FETCH_CONCURRENCY: "32"
  CLEANUP_EMBEDDED_IMAGES: "true"
  WORKER_POLL_SECONDS: "5"
  CLAIM_LEASE_SECONDS: "900"
  CLAIM_HEARTBEAT_SECONDS: "60"
  REVIEW_CLASSIFICATION_BATCH_SIZE: "8"
  REVIEW_RECENT_CAP_PER_PRODUCT: "200"
  REVIEW_HELPFUL_CAP_PER_PRODUCT: "200"
  REVIEW_TAG_MIN_COUNT: "3"
  REVIEW_TAG_MIN_FRACTION: "0.05"
  REVIEW_TAG_SAMPLE_COUNT: "3"
  OPENROUTER_BASE_URL: https://openrouter.ai/api/v1
  OPENROUTER_MODEL: google/gemini-2.0-flash-lite-001
  OPENROUTER_APP_TITLE: hev-shop
