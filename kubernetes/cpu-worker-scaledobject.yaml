apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: hev-shop-cpu-worker
spec:
  scaleTargetRef:
    name: hev-shop-cpu-worker
  pollingInterval: 10
  cooldownPeriod: 60
  minReplicaCount: 0
  maxReplicaCount: 8
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://layer-gateway.layer.svc.cluster.local:8080/v2/metrics
        metricName: hev_shop_extraction_jobs
        query: 'sum(layer_pipeline_stage_count{pipeline_id="hev-shop-extraction-jobs",stage=~"pending|extracting"}) or vector(0)'
        threshold: "2"
        activationThreshold: "0"
