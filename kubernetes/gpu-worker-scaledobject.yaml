apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: hev-shop-gpu-worker
spec:
  scaleTargetRef:
    name: hev-shop-gpu-worker
  pollingInterval: 15
  cooldownPeriod: 300
  minReplicaCount: 0
  maxReplicaCount: 1
  triggers:
    - type: postgresql
      metadata:
        connectionFromEnv: LAYER_DATABASE_URL
        query: "SELECT CASE WHEN EXISTS (SELECT 1 FROM pipeline_documents WHERE pipeline_id = 'amazon-products-images' AND stage IN ('pending', 'embedding') LIMIT 1) THEN 10000 ELSE 0 END"
        targetQueryValue: "10000"
        activationTargetQueryValue: "0"
