apiVersion: apps/v1
kind: Deployment
metadata:
  name: hev-shop-review-aggregate-worker
  labels:
    app.kubernetes.io/name: hev-shop
    app.kubernetes.io/component: review-aggregate-worker
spec:
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: hev-shop
      app.kubernetes.io/component: review-aggregate-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hev-shop
        app.kubernetes.io/component: review-aggregate-worker
    spec:
      nodeSelector:
        mesh-role: app
      tolerations:
        - key: mesh-role
          operator: Equal
          value: app
          effect: NoSchedule
      containers:
        - name: worker
          image: hev-shop-indexer:latest
          imagePullPolicy: Always
          command: ["python", "-m", "app.worker"]
          env:
            - name: WORKER_TYPE
              value: review-aggregate
            - name: WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          envFrom:
            - configMapRef:
                name: hev-shop-config
            - secretRef:
                name: hev-shop-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hev-shop-data
