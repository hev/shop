apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: hev-shop-review-aggregate-worker
spec:
  scaleTargetRef:
    name: hev-shop-review-aggregate-worker
  pollingInterval: 15
  cooldownPeriod: 60
  minReplicaCount: 0
  maxReplicaCount: 4
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://layer-gateway.layer.svc.cluster.local:8080/v2/metrics
        metricName: hev_shop_review_aggregation_docs
        query: 'sum(layer_pipeline_stage_count{pipeline_id="hev-shop-review-tags",stage=~"pending|aggregating"}) or vector(0)'
        threshold: "1"
        activationThreshold: "0"
