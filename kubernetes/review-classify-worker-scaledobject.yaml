apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: hev-shop-review-classify-worker
spec:
  scaleTargetRef:
    name: hev-shop-review-classify-worker
  pollingInterval: 30
  cooldownPeriod: 120
  minReplicaCount: 0
  maxReplicaCount: 4
  triggers:
    - type: postgresql
      metadata:
        connectionFromEnv: LAYER_DATABASE_URL
        query: "SELECT CASE WHEN EXISTS (SELECT 1 FROM pipeline_documents WHERE pipeline_id = 'hev-shop-reviews' AND document_id LIKE 'review-classify:%' AND stage IN ('pending', 'classifying') LIMIT 1) THEN 400 ELSE 0 END"
        targetQueryValue: "100"
        activationTargetQueryValue: "0"
