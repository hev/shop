apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: hev-shop-review-classify-worker
spec:
  scaleTargetRef:
    name: hev-shop-review-classify-worker
  pollingInterval: 30
  cooldownPeriod: 120
  minReplicaCount: 0
  maxReplicaCount: 4
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://layer-gateway.layer.svc.cluster.local:8080/v2/metrics
        metricName: hev_shop_review_classification_docs
        query: 'sum(layer_pipeline_stage_count{pipeline_id="hev-shop-reviews",stage=~"pending|classifying"}) or vector(0)'
        threshold: "100"
        activationThreshold: "0"
