apiVersion: apps/v1
kind: Deployment
metadata:
  name: hev-shop-review-embed-worker
  labels:
    app.kubernetes.io/name: hev-shop
    app.kubernetes.io/component: review-embed-worker
spec:
  replicas: 0
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hev-shop
      app.kubernetes.io/component: review-embed-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hev-shop
        app.kubernetes.io/component: review-embed-worker
    spec:
      nodeSelector:
        mesh-role: gpu
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: karpenter.k8s.aws/instance-family
                    operator: In
                    values:
                      - g5
                  - key: karpenter.sh/capacity-type
                    operator: In
                    values:
                      - on-demand
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: worker
          image: hev-shop-indexer:latest
          imagePullPolicy: Always
          command: ["python", "-m", "app.worker"]
          env:
            - name: WORKER_TYPE
              value: review-embed
            - name: WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          envFrom:
            - configMapRef:
                name: hev-shop-config
            - secretRef:
                name: hev-shop-secrets
          resources:
            requests:
              cpu: "1"
              memory: 13Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: 15Gi
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hev-shop-data
