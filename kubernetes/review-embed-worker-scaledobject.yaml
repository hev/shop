apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: hev-shop-review-embed-worker
spec:
  scaleTargetRef:
    name: hev-shop-review-embed-worker
  pollingInterval: 15
  cooldownPeriod: 300
  minReplicaCount: 0
  maxReplicaCount: 1
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://layer-gateway.layer.svc.cluster.local:8080/v2/metrics
        metricName: hev_shop_review_embedding_docs
        query: 'sum(layer_pipeline_stage_count{pipeline_id="hev-shop-reviews",stage=~"pending|embedding"}) or vector(0)'
        threshold: "1000"
        activationThreshold: "0"
