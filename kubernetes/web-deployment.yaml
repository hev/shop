apiVersion: apps/v1
kind: Deployment
metadata:
  name: hev-shop-web
  labels:
    app.kubernetes.io/name: hev-shop
    app.kubernetes.io/component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hev-shop
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hev-shop
        app.kubernetes.io/component: web
    spec:
      nodeSelector:
        mesh-role: infra
      tolerations:
        - key: mesh-role
          operator: Equal
          value: infra
          effect: NoSchedule
      containers:
        - name: web
          image: hev-shop-web:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: HEV_SHOP_API_BASE
              value: http://hev-shop-api.hev-shop.svc.cluster.local:8080
            - name: NODE_ENV
              value: production
            - name: NEXT_TELEMETRY_DISABLED
              value: "1"
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
