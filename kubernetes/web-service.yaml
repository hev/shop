apiVersion: v1
kind: Service
metadata:
  name: hev-shop-web
  labels:
    app.kubernetes.io/name: hev-shop
    app.kubernetes.io/component: web
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: hev-shop
    app.kubernetes.io/component: web
  ports:
    - name: http
      port: 80
      targetPort: http
